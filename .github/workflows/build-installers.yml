name: Build installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Installer target to build
        required: true
        default: both
        type: choice
        options:
          - both
          - macos
          - windows
      upload_logs:
        description: Upload build logs even when build fails
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: build-installers-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  macos-dmg:
    name: macOS DMG
    if: ${{ inputs.target == 'both' || inputs.target == 'macos' }}
    runs-on: macos-14
    timeout-minutes: 720
    env:
      MAKE: gmake
      GNUMAKE: gmake
      MAKEFLAGS: -j3
      KDOFFICE_PRODUCT_NAME: 可圈office
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install macOS build dependencies
        run: |
          brew update
          brew install autoconf automake coreutils gnu-tar gnu-sed gawk pkg-config make nasm ninja ccache gettext

      - name: Configure unsigned macOS build
        run: |
          CONFIGURE_FLAGS=(
            --with-distro=LibreOfficeMacOSX
            --disable-online-update
            --disable-scripting-beanshell
            --disable-scripting-javascript
            --disable-report-builder
            --disable-ext-nlpsolver
            --disable-odk
            --without-java
            --enable-release-build
            --with-product-name="$KDOFFICE_PRODUCT_NAME"
            --with-package-format=dmg
            --with-lang=zh-CN
            --with-macosx-bundle-identifier=com.kdoffice.app
            --enable-bogus-pkg-config
          )
          if [ -d "$PWD/downstream-branding" ]; then
            CONFIGURE_FLAGS+=(--with-branding="$PWD/downstream-branding")
          fi
          ./autogen.sh "${CONFIGURE_FLAGS[@]}"

      - name: Build macOS installer
        run: |
          gmake build
          gmake PKGFORMAT=dmg MACOSX_CODESIGNING_IDENTITY= MACOSX_PACKAGE_SIGNING_IDENTITY= instsetoo_native

      - name: Collect macOS installers
        if: always()
        run: |
          mkdir -p artifacts/macos
          if [ "${{ inputs.upload_logs }}" = "true" ]; then
            mkdir -p logs/macos
          fi
          if [ -d workdir/installation ]; then
            find workdir/installation -type f \( -name '*.dmg' -o -name '*.pkg' \) -print | while IFS= read -r artifact; do
              target="artifacts/macos/${artifact#workdir/installation/}"
              mkdir -p "$(dirname "$target")"
              cp "$artifact" "$target"
            done
          fi
          if [ "${{ inputs.upload_logs }}" = "true" ] && [ -d workdir ]; then
            find workdir -type f \( -name '*.log' -o -name '*.err' \) -print | while IFS= read -r log_file; do
              target="logs/macos/${log_file#workdir/}"
              mkdir -p "$(dirname "$target")"
              cp "$log_file" "$target"
            done 2>/dev/null || true
          fi

      - name: Verify macOS installers were collected
        run: |
          installer_count="$(find artifacts/macos -type f \( -name '*.dmg' -o -name '*.pkg' \) | wc -l | tr -d ' ')"
          if [ "$installer_count" -eq 0 ]; then
            echo "::error::No macOS DMG/PKG installers were collected from workdir/installation. Check the instsetoo_native build log."
            exit 1
          fi
          find artifacts/macos -type f -print

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-macos-installers
          path: artifacts/macos/
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS logs
        if: ${{ always() && inputs.upload_logs }}
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-macos-logs
          path: logs/macos/
          if-no-files-found: ignore
          retention-days: 7

  windows-msi:
    name: Windows MSI
    if: ${{ inputs.target == 'both' || inputs.target == 'windows' }}
    runs-on: windows-2022
    timeout-minutes: 720
    defaults:
      run:
        shell: cygwin {0}
    env:
      MAKEFLAGS: -j3
      KDOFFICE_PRODUCT_NAME: 可圈office
      CYGWIN_NOWINPATH: 1
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Cygwin
        uses: cygwin/cygwin-install-action@v5
        with:
          packages: >-
            autoconf
            automake
            bison
            ccache
            curl
            diffutils
            flex
            gawk
            gcc-g++
            git
            gnupg
            make
            mintty
            nasm
            patch
            perl
            pkg-config
            python3
            unzip
            zip

      - name: Configure unsigned Windows MSI build
        run: |
          export SRC_ROOT="$(cygpath -u "$GITHUB_WORKSPACE")"
          cd "$SRC_ROOT"
          CONFIGURE_FLAGS=(
            --host=x86_64-pc-cygwin
            --with-visual-studio=2022
            --with-package-format=msi
            --with-product-name="$KDOFFICE_PRODUCT_NAME"
            --with-lang=zh-CN
            --disable-online-update
            --disable-odk
            --without-junit
            --without-helppack-integration
            --enable-release-build
          )
          if [ -d "$SRC_ROOT/downstream-branding" ]; then
            CONFIGURE_FLAGS+=(--with-branding="$SRC_ROOT/downstream-branding")
          fi
          ./autogen.sh "${CONFIGURE_FLAGS[@]}"

      - name: Build Windows MSI
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          make build
          make test-install

      - name: Collect Windows installers
        if: always()
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          mkdir -p artifacts/windows
          if [ "${{ inputs.upload_logs }}" = "true" ]; then
            mkdir -p logs/windows
          fi
          if [ -d workdir/installation ]; then
            find workdir/installation -type f \( -name '*.msi' -o -name '*.cab' -o -name '*.exe' \) -print | while IFS= read -r artifact; do
              target="artifacts/windows/${artifact#workdir/installation/}"
              mkdir -p "$(dirname "$target")"
              cp "$artifact" "$target"
            done
          fi
          if [ "${{ inputs.upload_logs }}" = "true" ] && [ -d workdir ]; then
            find workdir -type f \( -name '*.log' -o -name '*.err' \) -print | while IFS= read -r log_file; do
              target="logs/windows/${log_file#workdir/}"
              mkdir -p "$(dirname "$target")"
              cp "$log_file" "$target"
            done 2>/dev/null || true
          fi

      - name: Verify Windows installers were collected
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          installer_count="$(find artifacts/windows -type f \( -name '*.msi' -o -name '*.exe' \) | wc -l | tr -d ' ')"
          if [ "$installer_count" -eq 0 ]; then
            echo "::error::No Windows MSI/EXE installers were collected from workdir/installation. Check the instsetoo_native build log."
            exit 1
          fi
          find artifacts/windows -type f -print

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-windows-installers
          path: artifacts/windows/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows logs
        if: ${{ always() && inputs.upload_logs }}
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-windows-logs
          path: logs/windows/
          if-no-files-found: ignore
          retention-days: 7
