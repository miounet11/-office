name: Build installers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Installer target to build
        required: true
        default: both
        type: choice
        options:
          - both
          - macos
          - windows
      upload_logs:
        description: Upload build logs even when build fails
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: build-installers-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  macos-dmg:
    name: macOS DMG
    if: ${{ inputs.target == 'both' || inputs.target == 'macos' }}
    runs-on: macos-14
    timeout-minutes: 720
    env:
      MAKEFLAGS: -j3
      KDOFFICE_PRODUCT_NAME: 可圈office
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install macOS build dependencies
        run: |
          brew update
          brew install autoconf automake coreutils gnu-tar gnu-sed gawk pkg-config make nasm ninja ccache gettext

      - name: Configure unsigned macOS build
        run: |
          CONFIGURE_FLAGS=(
            --with-distro=LibreOfficeMacOSX
            --disable-online-update
            --disable-scripting-beanshell
            --disable-scripting-javascript
            --disable-report-builder
            --disable-ext-nlpsolver
            --disable-odk
            --without-java
            --enable-release-build
            --with-product-name="$KDOFFICE_PRODUCT_NAME"
            --enable-bogus-pkg-config
          )
          if [ -d "$PWD/downstream-branding" ]; then
            CONFIGURE_FLAGS+=(--with-branding="$PWD/downstream-branding")
          fi
          ./autogen.sh "${CONFIGURE_FLAGS[@]}"

      - name: Build macOS installer
        run: |
          make build
          make PKGFORMAT=dmg MACOSX_CODESIGNING_IDENTITY= MACOSX_PACKAGE_SIGNING_IDENTITY= test-install

      - name: Collect macOS installers
        if: always()
        run: |
          mkdir -p artifacts/macos logs/macos
          find instdir workdir -type f \( -name '*.dmg' -o -name '*.pkg' -o -name '*.tar.gz' \) -print -exec cp {} artifacts/macos/ \; 2>/dev/null || true
          find workdir -type f \( -name '*.log' -o -name '*.err' \) -print -exec cp {} logs/macos/ \; 2>/dev/null || true

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-macos-installers
          path: artifacts/macos/
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS logs
        if: ${{ always() && inputs.upload_logs }}
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-macos-logs
          path: logs/macos/
          if-no-files-found: ignore
          retention-days: 7

  windows-msi:
    name: Windows MSI
    if: ${{ inputs.target == 'both' || inputs.target == 'windows' }}
    runs-on: windows-2022
    timeout-minutes: 720
    defaults:
      run:
        shell: cygwin {0}
    env:
      MAKEFLAGS: -j3
      KDOFFICE_PRODUCT_NAME: 可圈office
      CYGWIN_NOWINPATH: 1
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Cygwin
        uses: cygwin/cygwin-install-action@v5
        with:
          packages: >-
            autoconf
            automake
            bison
            ccache
            curl
            diffutils
            flex
            gawk
            gcc-g++
            git
            gnupg
            make
            mintty
            nasm
            patch
            perl
            pkg-config
            python3
            unzip
            zip

      - name: Configure unsigned Windows MSI build
        run: |
          export SRC_ROOT="$(cygpath -u "$GITHUB_WORKSPACE")"
          cd "$SRC_ROOT"
          CONFIGURE_FLAGS=(
            --host=x86_64-pc-cygwin
            --with-visual-studio=2022
            --with-package-format=msi
            --with-product-name="$KDOFFICE_PRODUCT_NAME"
            --disable-online-update
            --disable-odk
            --without-junit
            --without-helppack-integration
            --enable-release-build
          )
          if [ -d "$SRC_ROOT/downstream-branding" ]; then
            CONFIGURE_FLAGS+=(--with-branding="$SRC_ROOT/downstream-branding")
          fi
          ./autogen.sh "${CONFIGURE_FLAGS[@]}"

      - name: Build Windows MSI
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          make build
          make test-install

      - name: Collect Windows installers
        if: always()
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          mkdir -p artifacts/windows logs/windows
          find instdir workdir -type f \( -name '*.msi' -o -name '*.cab' -o -name '*.exe' \) -print -exec cp {} artifacts/windows/ \; 2>/dev/null || true
          find workdir -type f \( -name '*.log' -o -name '*.err' \) -print -exec cp {} logs/windows/ \; 2>/dev/null || true

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-windows-installers
          path: artifacts/windows/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows logs
        if: ${{ always() && inputs.upload_logs }}
        uses: actions/upload-artifact@v4
        with:
          name: kdoffice-windows-logs
          path: logs/windows/
          if-no-files-found: ignore
          retention-days: 7
