name: V2 contract harnesses

on:
  push:
    branches: [main]
    paths:
      - 'docs/schemas/**'
      - 'docs/product/v2/**'
      - 'docs/CLAUDE-NOTES.md'
      - 'kqoffice/source/ai/provider/**'
      - 'tests/v2-*.sh'
      - 'bin/intelligent-contract-fixtures.sh'
      - '.github/workflows/v2-contract-harnesses.yml'
  pull_request:
    paths:
      - 'docs/schemas/**'
      - 'docs/product/v2/**'
      - 'docs/CLAUDE-NOTES.md'
      - 'kqoffice/source/ai/provider/**'
      - 'tests/v2-*.sh'
      - 'bin/intelligent-contract-fixtures.sh'
      - '.github/workflows/v2-contract-harnesses.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v2-contract-harnesses-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harnesses:
    name: V2 contract harnesses
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show python3 version
        run: python3 --version

      - name: H1 — provider-evidence schema ↔ C++ drift lock
        run: bash tests/v2-provider-evidence-schema-test.sh

      - name: H2 — V2 plan baseline (specs + 36 fixtures + goals + roster locks)
        run: bash tests/v2-plan-baseline-test.sh

      - name: H3 — V2 Day-0 skeleton doc coherence
        run: bash tests/v2-day0-skeleton-test.sh

      - name: H4 — W5 async-task schema ↔ spec token lock (partial-enforce)
        run: bash tests/v2-async-task-schema-test.sh

      - name: H5 — W4 inline-action-request schema ↔ spec action lock (partial-enforce)
        run: bash tests/v2-inline-action-request-schema-test.sh

      - name: H6 — V2 reader's-manual fact-block ↔ schema body coherence
        run: bash tests/v2-schema-manual-coherence-test.sh

      - name: H7 — W3 apply-plan-runtime schema ↔ spec patch-kind lock (partial-enforce)
        run: bash tests/v2-apply-plan-runtime-schema-test.sh

      - name: V1.5 m3-02 intelligent-contract fixtures (36 across 13 schemas)
        run: |
          bash bin/intelligent-contract-fixtures.sh
          # Fail loudly if any fixture entry didn't pass.
          fail_count="$(grep -c '| failed |' tmp/intelligent-contract-fixtures.md || true)"
          pass_count="$(grep -c '| passed |' tmp/intelligent-contract-fixtures.md || true)"
          echo "Fixture results: passed=${pass_count} failed=${fail_count}"
          if [ "${fail_count}" != "0" ]; then
            echo "::error::V1.5 m3-02 fixtures regressed (${fail_count} failed)"
            exit 1
          fi
          if [ "${pass_count}" -lt 36 ]; then
            echo "::error::Expected ≥36 fixtures to pass; got ${pass_count}"
            exit 1
          fi
